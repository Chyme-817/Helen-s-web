<!DOCTYPE html>
<head>
    <title>Fill Guestbook</title>
    <link rel="style.css" href="style.css">
</head>
<body>
    <nav>
            <a href="About me.html">Home</a>
            <a href="My gallery.html">My gallery</a>
            <a href="Guest form.html">Guest form</a>
    </nav>
    <main>
        <form action="#" method="post" onsubmit="alert('Form submitted successfully!!');">
            <fieldset>

                <p class="form-group">
                    <label>Full Name</label><br>
                    <input type="text" id="fullname" placeholder="full name" required>
                </p>

                <p class="form-group">
                    <label>Gender:</label><br>
                    <input type="radio" id="female" name="gender" value="female">
                    <input type="radio" id="male" name="gender" value="male">
                    <br>
                </p>

                <p class="form-group">
                    <label>Message:</label>
                    <textarea id="Message" placeholder="type your messaege here.."></textarea>
                </p>

                    <div class="button-group">
                        <input type="reset" value="Reset Form">
                        <input type="submit" value="Submit Form">
                    </div>
            </fieldset>
        </form>
    </main>

</body>
